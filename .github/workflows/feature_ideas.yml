name: Weekly Feature Ideas

on:
  schedule:
    - cron: "0 22 * * 5"   # Friday 22:00 UTC = 5pm EST / 6pm EDT
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date YYYY-MM-DD. Defaults to today."
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai anthropic

      - name: Set run date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "RUN_DATE=${{ inputs.run_date }}" >> "$GITHUB_ENV"
          else
            echo "RUN_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
          fi

      - name: Generate feature ideas
        run: python scripts/feature_idea_generator.py --date "$RUN_DATE"

      - name: Commit feature PRDs
        run: |
          git config user.name "sector-bot"
          git config user.email "sector-bot@users.noreply.github.com"
          git add drafts/features/
          git diff --cached --quiet || git commit -m "feat: weekly feature PRDs $RUN_DATE"
          git push || true

      - name: Score and rank features
        run: python scripts/rank_features_nightly.py

      - name: Append virality top 10 to summary
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path

          rank_file = Path("reports/virality/master_rank.json")
          summary_file = Path(f"drafts/features/${{ env.RUN_DATE }}/summary.txt")

          if not rank_file.exists() or not summary_file.exists():
              print("Skipping: rank or summary file missing")
              exit(0)

          ranked = json.loads(rank_file.read_text())
          top10 = [r for r in ranked if r.get("verdict") != "ERROR"][:10]

          lines = [
              "",
              "=" * 50,
              "VIRALITY TOP 10 (V-Factor adjusted score)",
              "=" * 50,
              "",
          ]
          for i, r in enumerate(top10, 1):
              verdict = r.get("verdict", "?")
              score = r.get("adjusted_score", 0)
              name = r.get("feature_name", "?")
              lines.append(f"  {i:>2}. {name} — {verdict} (score={score})")

          lines += [
              "",
              "Scores: BUILD_NOW >= 8 (complexity <= 3) | BUILD_LATER >= 5 | SKIP",
              "Full report: reports/virality/master_rank.md",
          ]

          with summary_file.open("a") as f:
              f.write("\n".join(lines) + "\n")

          print(f"Appended top {len(top10)} to {summary_file}")
          EOF

      - name: Commit virality reports
        run: |
          git add reports/virality/
          git diff --cached --quiet || git commit -m "feat: virality scores $RUN_DATE"
          git push || true

      - name: Send summary email
        if: ${{ env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "Feature Ideas — ${{ env.RUN_DATE }}"
          body: file:///home/runner/work/sector-rotation-trader/sector-rotation-trader/drafts/features/${{ env.RUN_DATE }}/summary.txt
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}
