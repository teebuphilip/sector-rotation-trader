name: Daily Sector Rotation Run

on:
  schedule:
    # 6:30 PM ET (22:30 UTC) — after US market close
    - cron: '30 22 * * 1-5'
  workflow_dispatch:   # manual trigger any time

permissions:
  contents: write

jobs:
  daily-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily simulation
        run: python daily_run.py

      - name: Run normal algos
        run: python normal_run.py

      - name: Run crazy algos
        run: python crazy_run.py

      - name: Generate rolling leaderboard
        run: python scripts/rolling_30d_leaderboard.py

      - name: Commit updated state + dashboard
        run: |
          git config user.name  "sector-bot"
          git config user.email "sector-bot@users.noreply.github.com"
          git add state.json docs/index.html docs/trades.json
          git add data/normal/state docs/normal
          git add data/crazy/state docs/algos docs/crazy
          if [ -d docs/ledgers ]; then
            git add docs/ledgers
          fi
          if [ -d docs/leaderboards ]; then
            git add docs/leaderboards
          fi
          if [ -f docs/algos/index.md ]; then
            git add docs/algos/index.md
          fi
          if [ -d data/blocked ]; then
            git add data/blocked
          fi
          git diff --cached --quiet || git commit -m "daily run $(date -u '+%Y-%m-%d') — $(python -c "
          import json
          s = json.load(open('state.json'))
          buys  = [t for t in s['trade_log'] if t['action']=='BUY'  and t['date']==__import__('datetime').date.today().isoformat()]
          sells = [t for t in s['trade_log'] if t['action']=='SELL' and t['date']==__import__('datetime').date.today().isoformat()]
          snap  = s['daily_snapshots'][-1] if s['daily_snapshots'] else {}
          eq    = snap.get('equity', 0)
          print(f'sector={snap.get(\"sector\",\"—\")} | {len(buys)}B {len(sells)}S | equity=\${eq:,.0f}')
          ")"
          git pull --rebase
          git push

      - name: Prepare daily stats email
        if: ${{ success() && secrets.ALERT_EMAIL_TO != '' }}
        run: |
          echo "AFH_RUN_DATE=$(date -u +%F)" >> $GITHUB_ENV
          python scripts/daily_stats_email.py > /tmp/crazy_daily_email.txt
          echo "CRAZY_DAILY_EMAIL_BODY<<EOF" >> $GITHUB_ENV
          cat /tmp/crazy_daily_email.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Email daily stats
        if: ${{ success() && secrets.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: Crazy Daily Stats — ${{ env.AFH_RUN_DATE }}
          body: ${{ env.CRAZY_DAILY_EMAIL_BODY }}
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}

      - name: Create issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "Daily run failed $(date -u '+%Y-%m-%d')" \
            --body "The daily sector rotation run failed. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --label "bug"
        env:
          GH_TOKEN: ${{ github.token }}
