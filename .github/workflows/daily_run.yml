name: Daily Sector Rotation Run

on:
  schedule:
    # 6:30 PM ET (22:30 UTC) — after US market close
    - cron: '30 22 * * 1-5'
  workflow_dispatch:   # manual trigger any time

permissions:
  contents: write
  issues: write

jobs:
  daily-run:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dependency smoke check
        run: python -c "import pandas, numpy, yfinance, requests; print('dependency smoke check OK')"

      - name: Run daily simulation
        run: python daily_run.py

      - name: Run normal algos
        run: python normal_run.py

      - name: Run crazy algos
        run: python crazy_run.py

      - name: Cleanup blocked keys
        run: python scripts/cleanup_blocked_keys.py

      - name: Pre-compute signal verdicts
        run: python precompute_signals.py --min-days 30

      - name: Check public HTML placeholders
        run: python scripts/check_public_html_placeholders.py

      - name: Generate rolling leaderboard
        run: python scripts/rolling_30d_leaderboard.py

      - name: Daily force-rank all algos
        run: python scripts/rank_daily.py

      - name: Nightly validation (surface)
        id: validate_surface
        run: |
          rc=0; python scripts/validate_nightly.py || rc=$?
          if [ $rc -eq 2 ]; then
            echo "surface_failed=true" >> $GITHUB_OUTPUT
            echo "SURFACE VALIDATION FAILED (critical failures)"
            exit 1
          fi
          # exit 0 (all clear) or 1 (warnings only) — both OK to continue
          echo "surface_failed=false" >> $GITHUB_OUTPUT
          exit 0

      - name: Nightly validation (deep)
        id: validate_deep
        if: steps.validate_surface.outcome == 'success'
        run: python scripts/validate_nightly.py --deep || true

      - name: Quality check
        id: quality_check
        if: steps.validate_surface.outcome == 'success' && steps.validate_deep.outcome == 'success'
        run: python scripts/quality_check.py

      - name: Commit updated state + dashboard
        if: always()
        run: |
          git config user.name  "sector-bot"
          git config user.email "sector-bot@users.noreply.github.com"
          git add state.json docs/nrwise.html docs/trades.json
          git add data/normal/state docs/normal
          git add data/crazy/state docs/algos docs/crazy
          git add docs/signals || true
          if [ -d docs/ledgers ]; then
            git add docs/ledgers
          fi
          if [ -d docs/leaderboards ]; then
            git add docs/leaderboards
          fi
          if [ -f docs/algos/index.md ]; then
            git add docs/algos/index.md
          fi
          if [ -d data/blocked ]; then
            git add data/blocked
          fi
          if [ -f data/rank_history.csv ]; then
            git add data/rank_history.csv
          fi
          if [ -d docs/quality_checks ]; then
            git add docs/quality_checks
          fi
          if [ -d data/product ]; then
            git add data/product
          fi
          git diff --cached --quiet || git commit -m "daily run $(date -u '+%Y-%m-%d') — $(python -c "
          import json
          s = json.load(open('state.json'))
          buys  = [t for t in s['trade_log'] if t['action']=='BUY'  and t['date']==__import__('datetime').date.today().isoformat()]
          sells = [t for t in s['trade_log'] if t['action']=='SELL' and t['date']==__import__('datetime').date.today().isoformat()]
          snap  = s['daily_snapshots'][-1] if s['daily_snapshots'] else {}
          eq    = snap.get('equity', 0)
          print(f'sector={snap.get(\"sector\",\"—\")} | {len(buys)}B {len(sells)}S | equity=\${eq:,.0f}')
          ")"
          git pull --rebase --autostash
          git push

      - name: Prepare evening email
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        run: |
          echo "AFH_RUN_DATE=$(date -u +%F)" >> $GITHUB_ENV
          python scripts/evening_email.py > /tmp/evening_email.txt || echo "evening_email.py failed" > /tmp/evening_email.txt
          QC_FILE="docs/quality_checks/quality_check_$(date -u +%F).md"
          if [ -f "$QC_FILE" ]; then
            echo "" >> /tmp/evening_email.txt
            echo "=================================================" >> /tmp/evening_email.txt
            echo "" >> /tmp/evening_email.txt
            cat "$QC_FILE" >> /tmp/evening_email.txt
          fi

      - name: Email evening trading report
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "Evening Trading Report — ${{ env.AFH_RUN_DATE }} — ${{ job.status }}"
          body: file:///tmp/evening_email.txt
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}

      - name: Create issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "Daily run failed $(date -u '+%Y-%m-%d')" \
            --body "The daily sector rotation run failed. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --label "bug" || echo "Issue creation failed; continuing"
        env:
          GH_TOKEN: ${{ github.token }}
