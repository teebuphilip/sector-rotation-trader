name: Morning Stats Email

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date in YYYY-MM-DD format. Defaults to yesterday UTC."
        required: false
        type: string

permissions:
  contents: read

jobs:
  send-stats:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set run date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "AFH_RUN_DATE=${{ inputs.run_date }}" >> "$GITHUB_ENV"
          else
            echo "AFH_RUN_DATE=$(date -u -d 'yesterday' +%F)" >> "$GITHUB_ENV"
          fi

      - name: Build stats email
        run: |
          python scripts/daily_stats_email.py > /tmp/morning_stats.txt || echo "daily_stats_email.py failed" > /tmp/morning_stats.txt

      - name: Send stats email
        if: ${{ env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "Daily Stats — ${{ env.AFH_RUN_DATE }}"
          body: file:///tmp/morning_stats.txt
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}
