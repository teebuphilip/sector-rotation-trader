name: Morning Content Email

on:
  schedule:
    - cron: "30 9 * * *"   # 09:30 UTC = 4:30am EST / 5:30am EDT
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date YYYY-MM-DD. Defaults to yesterday UTC."
        required: false
        type: string

permissions:
  contents: write

jobs:
  content-email:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set run date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "AFH_RUN_DATE=${{ inputs.run_date }}" >> "$GITHUB_ENV"
          else
            echo "AFH_RUN_DATE=$(date -u -d 'yesterday' +%F)" >> "$GITHUB_ENV"
          fi

      - name: Generate post draft
        run: |
          python scripts/post_generator.py --date "$AFH_RUN_DATE" || \
            echo "[warn] post_generator failed — draft may be missing"

      - name: Commit draft
        run: |
          git config user.name "sector-bot"
          git config user.email "sector-bot@users.noreply.github.com"
          git add drafts/ || true
          git diff --cached --quiet || git commit -m "chore: add content draft $AFH_RUN_DATE"
          git push || true

      - name: Build content email
        run: |
          python scripts/morning_content_email.py > /tmp/morning_content.txt || \
            echo "morning_content_email.py failed" > /tmp/morning_content.txt

      - name: Send content email
        if: ${{ env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "Content Draft — ${{ env.AFH_RUN_DATE }}"
          body: file:///tmp/morning_content.txt
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}
