name: Overnight Status And Drive Sync

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  overnight-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build overnight status report
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONPATH: .
        run: python scripts/overnight_status_report.py

      - name: Set ET report date
        run: echo "ET_REPORT_DATE=$(TZ=America/New_York date +%F)" >> "$GITHUB_ENV"

      - name: Push latest ops files to Drive
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_ID }}
          GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_SECRET }}
          GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN }}
          ET_REPORT_DATE: ${{ env.ET_REPORT_DATE }}
        run: >
          python scripts/push_ops_files_to_drive.py --config gemini_feed_config.json
