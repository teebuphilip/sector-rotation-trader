name: Overnight Status Report

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  overnight-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build overnight status report
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONPATH: .
        run: python scripts/overnight_status_report.py

      - name: Set ET report date
        run: echo "ET_REPORT_DATE=$(TZ=America/New_York date +%F)" >> "$GITHUB_ENV"

      - name: Note
        run: echo "Drive push disabled; Relay.app now handles downstream distribution."
