name: Crazy Idea Daily

on:
  schedule:
    - cron: "15 9 * * *"  # 09:15 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set run date
        run: |
          echo "AFH_RUN_DATE=$(date -u +%F)" >> $GITHUB_ENV

      - name: Generate high-action ideas
        id: generate
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          python scripts/crazy_generate_high_action_ideas.py --date "$AFH_RUN_DATE"

      - name: Aggregate idea reports
        if: always()
        run: |
          python scripts/compare_ideas.py --base data/ideas || true
          python scripts/ai_costs_aggregate.py || true

      - name: Dump generator errors
        if: always()
        run: |
          ERR_DIR="data/ideas/runs/$AFH_RUN_DATE/errors"
          RESP_DIR="data/ideas/runs/$AFH_RUN_DATE/responses"
          if [ -d "$ERR_DIR" ]; then
            echo "=== generator errors ==="
            for f in "$ERR_DIR"/*.txt; do
              [ -f "$f" ] || continue
              echo "--- $f ---"
              cat "$f"
            done
          fi
          if [ -d "$RESP_DIR" ]; then
            echo "=== generator response codes ==="
            for f in "$RESP_DIR"/*_http_code.txt; do
              [ -f "$f" ] || continue
              echo "--- $f ---"
              cat "$f"
            done
          fi

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/ideas docs/ideas
          if [ -d logs ]; then
            git add logs
          fi
          git commit -m "daily: crazy idea run" || echo "No changes to commit"
          git pull --rebase --autostash
          git push

      - name: Fail if generation failed
        if: steps.generate.outcome != 'success'
        run: |
          echo "::error::Crazy idea generation failed. Partial outputs and errors were committed."
          exit 1
