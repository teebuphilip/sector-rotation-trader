name: Crazy Idea Daily

on:
  schedule:
    - cron: "15 9 * * *"  # 09:15 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip

      - name: Set run date
        run: |
          echo "AFH_RUN_DATE=$(date -u +%F)" >> $GITHUB_ENV

      - name: Generate ideas
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          python scripts/crazy_generate_ideas.py
          python scripts/crazy_score_ideas.py
          python scripts/crazy_publish_markdown.py
          python scripts/compare_ideas.py --base data/ideas
          python scripts/ai_costs_aggregate.py

      - name: Prepare morning email
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        run: |
          python scripts/morning_email.py > /tmp/morning_email.txt || echo "morning_email.py failed" > /tmp/morning_email.txt
          echo "MORNING_EMAIL_BODY<<MORNING_EMAIL_END_7x9" >> $GITHUB_ENV
          cat /tmp/morning_email.txt >> $GITHUB_ENV
          echo "MORNING_EMAIL_END_7x9" >> $GITHUB_ENV

      - name: Validate email secrets
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        run: |
          if [ -z "${ALERT_EMAIL_TO}" ]; then
            echo "Missing ALERT_EMAIL_TO"; exit 1; fi
          if [ -z "${{ secrets.ALERT_EMAIL_USER }}" ]; then
            echo "Missing ALERT_EMAIL_USER"; exit 1; fi
          if [ -z "${{ secrets.ALERT_EMAIL_PASS }}" ]; then
            echo "Missing ALERT_EMAIL_PASS"; exit 1; fi

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/ideas docs/ideas
          if [ -d logs ]; then
            git add logs
          fi
          git commit -m "daily: crazy idea run" || echo "No changes to commit"
          git pull --rebase
          git push

      - name: Email morning ideation report
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "Morning Ideation — ${{ env.AFH_RUN_DATE }} — ${{ job.status }}"
          body: ${{ env.MORNING_EMAIL_BODY }}
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}

      - name: Email alert on failure
        if: ${{ failure() && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: Crazy Ideas Pipeline FAILED — ${{ env.AFH_RUN_DATE }}
          body: |
            The Crazy Ideas pipeline failed.
            Repo: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}
