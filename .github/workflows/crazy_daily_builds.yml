name: Crazy Daily Build Factory

on:
  workflow_run:
    workflows: ["Daily Sector Rotation Run"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date in YYYY-MM-DD format. Defaults to today's UTC date."
        required: false
        type: string
      limit:
        description: "Optional max specs to build. 0 means no limit."
        required: false
        default: "0"
        type: string

permissions:
  contents: write

concurrency:
  group: crazy-daily-build-factory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-signals:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency smoke check
        run: python -c "import pandas, numpy, yfinance, requests, langchain_openai; print('dependency smoke check OK')"

      - name: Set run date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "RUN_DATE=${{ inputs.run_date }}" >> "$GITHUB_ENV"
          else
            echo "RUN_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            echo "BUILD_LIMIT=${{ inputs.limit }}" >> "$GITHUB_ENV"
          else
            echo "BUILD_LIMIT=0" >> "$GITHUB_ENV"
          fi

      - name: Verify published idea specs exist
        run: |
          if [ ! -d "data/ideas/runs/$RUN_DATE/publish" ]; then
            echo "Missing publish specs for $RUN_DATE. Crazy Idea Daily must run before experiment activation."
            exit 1
          fi
          count=$(find "data/ideas/runs/$RUN_DATE/publish" -name '*.md' | wc -l | tr -d ' ')
          echo "Published specs: $count"
          if [ "$count" = "0" ]; then
            echo "No publish specs found for $RUN_DATE"
            exit 1
          fi

      - name: Final publish gate
        run: python scripts/final_publish_llm_gate.py --date "$RUN_DATE" --model "${OPENAI_MODEL:-gpt-4.1-mini}"

      - name: Build and seed accepted experiment specs
        id: autogen
        continue-on-error: true
        run: |
          set -o pipefail
          LIMIT_ARGS=""
          if [ "${BUILD_LIMIT}" != "0" ]; then
            LIMIT_ARGS="--limit ${BUILD_LIMIT}"
          fi
          python scripts/autogen_crazy_factory.py \
            --date "$RUN_DATE" \
            --skip-generate \
            --publish-root "data/ideas/runs/$RUN_DATE/build" \
            --template-build \
            --skip-run \
            --max-failures 5 \
            --verbose \
            $LIMIT_ARGS

      - name: Run V1 backtests for newly seeded algos
        if: always()
        run: |
          python scripts/run_factory_backtests.py \
            --date "$RUN_DATE" \
            --start 2024-01-01 \
            --end "$RUN_DATE"

      - name: Run newly seeded experiment algos only
        if: always()
        run: |
          python - <<'PY' > /tmp/new_crazy_algo_ids.txt
          import json
          import os
          from pathlib import Path

          root = Path("data/ideas/runs") / os.environ["RUN_DATE"] / "factory_results"
          ids = []
          for path in sorted(root.glob("*.json")):
              if path.name == "summary.json" or path.name.endswith("_template_build.json"):
                  continue
              data = json.loads(path.read_text())
              if data.get("seeded") and data.get("idea_id"):
                  ids.append(data["idea_id"])
          print("\n".join(ids))
          PY
          if [ ! -s /tmp/new_crazy_algo_ids.txt ]; then
            echo "No newly seeded experiment algos to run."
            exit 0
          fi
          while IFS= read -r algo_id; do
            [ -z "$algo_id" ] && continue
            echo "[experiment] running $algo_id"
            python crazy_run.py --algo-id "$algo_id" --skip-combined
          done < /tmp/new_crazy_algo_ids.txt

      - name: Rebuild aggregate experiment outputs
        if: always()
        run: |
          python scripts/rebuild_crazy_combined_dashboard.py
          python precompute_signals.py --min-days 30
          python scripts/rolling_30d_leaderboard.py
          python scripts/update_algos_index.py
          python scripts/build_product_index.py

      - name: Validate generated public files
        if: always()
        run: |
          python scripts/check_public_html_placeholders.py
          python -m py_compile scripts/autogen_crazy_factory.py scripts/build_template_algo.py scripts/build_product_index.py scripts/final_publish_llm_gate.py scripts/rebuild_crazy_combined_dashboard.py scripts/run_factory_backtests.py crazy/runner.py crazy_run.py

      - name: Summarize build
        if: always()
        run: |
          SUMMARY="data/ideas/runs/$RUN_DATE/factory_results/summary.json"
          GATE="data/ideas/runs/$RUN_DATE/publish_gate_reports/summary.json"
          {
            echo "## Crazy Daily Build Factory"
            echo ""
            echo "- Date: $RUN_DATE"
            echo "- Autogen outcome: ${{ steps.autogen.outcome }}"
            if [ -f "$GATE" ]; then
              echo "- Gate summary:"
              python - <<'PY'
          import json, os
          path = f"data/ideas/runs/{os.environ['RUN_DATE']}/publish_gate_reports/summary.json"
          with open(path) as f:
              d = json.load(f)
          print(f"  - build={d.get('build', 0)} intervention={d.get('intervention', 0)} reject={d.get('reject', 0)}")
          PY
            fi
            if [ -f "$SUMMARY" ]; then
              echo "- Factory summary:"
              python - <<'PY'
          import json, os
          path = f"data/ideas/runs/{os.environ['RUN_DATE']}/factory_results/summary.json"
          with open(path) as f:
              d = json.load(f)
          print(f"  - completed={d.get('completed', 0)} built={d.get('built', 0)} seeded={d.get('seeded', 0)} intervention={d.get('intervention', 0)} failed={d.get('failed', 0)} skipped={d.get('skipped', 0)}")
          bt = d.get('backtest') or {}
          if bt:
              counts = bt.get('counts') or {}
              counts_text = ' '.join(f"{k}={v}" for k, v in sorted(counts.items())) or 'none'
              print(f"  - backtest reviewed={bt.get('reviewed', 0)} {counts_text}")
          PY
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit generated signals
        if: always()
        run: |
          git config user.name "crazy-build-bot"
          git config user.email "crazy-build-bot@users.noreply.github.com"
          git add crazy/algos data/algos_registry_crazy.txt
          git add data/ideas docs/ideas
          git add data/crazy/state docs/algos docs/crazy
          git add data/product || true
          git add reports/backtests || true
          git add docs/signals docs/leaderboards docs/ledgers || true
          if [ -d data/blocked ]; then
            git add data/blocked
          fi
          if [ -d data/algos ]; then
            git add data/algos
          fi
          git diff --cached --quiet || git commit -m "daily: crazy build factory $RUN_DATE"
          git pull --rebase --autostash
          git push

      - name: Prepare build email
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        run: |
          python scripts/crazy_build_email.py > /tmp/crazy_build_email.txt || echo "crazy_build_email.py failed" > /tmp/crazy_build_email.txt

      - name: Email build report
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "Crazy Build Factory - ${{ env.RUN_DATE }} - ${{ job.status }}"
          body: file:///tmp/crazy_build_email.txt
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}

      - name: Assess factory result
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_date = os.environ["RUN_DATE"]
          summary_path = Path(f"data/ideas/runs/{run_date}/factory_results/summary.json")
          if not summary_path.exists():
              raise SystemExit("Factory summary missing; build pipeline did not produce a result.")

          summary = json.loads(summary_path.read_text())
          completed = int(summary.get("completed") or 0)
          seeded = int(summary.get("seeded") or 0)
          failed = int(summary.get("failed") or 0)
          run_ok = summary.get("run_ok", True)

          print(
              f"factory completed={completed} seeded={seeded} "
              f"failed={failed} run_ok={run_ok}"
          )

          if run_ok is False:
              raise SystemExit("Factory built algos, but final experiment run/precompute failed.")
          if completed == 0 or seeded == 0:
              print("Factory produced no newly seeded algos; treating as a clean no-op.")
              raise SystemExit(0)
          if failed:
              print("Factory had parked/failed specs, but seeded usable algos. Treating as success.")
          PY
