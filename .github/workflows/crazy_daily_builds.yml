name: Crazy Daily Build Factory

on:
  schedule:
    # Runs after Crazy Idea Daily, which starts at 09:15 UTC.
    - cron: "45 9 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date in YYYY-MM-DD format. Defaults to today's UTC date."
        required: false
        type: string
      limit:
        description: "Optional max specs to build. 0 means no limit."
        required: false
        default: "0"
        type: string

permissions:
  contents: write

concurrency:
  group: crazy-daily-build-factory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-signals:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency smoke check
        run: python -c "import pandas, numpy, yfinance, requests, langchain_openai; print('dependency smoke check OK')"

      - name: Set run date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "RUN_DATE=${{ inputs.run_date }}" >> "$GITHUB_ENV"
          else
            echo "RUN_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            echo "BUILD_LIMIT=${{ inputs.limit }}" >> "$GITHUB_ENV"
          else
            echo "BUILD_LIMIT=0" >> "$GITHUB_ENV"
          fi

      - name: Generate high-action ideas
        run: python scripts/crazy_generate_high_action_ideas.py --date "$RUN_DATE"

      - name: Final publish gate
        run: python scripts/final_publish_llm_gate.py --date "$RUN_DATE" --model "${OPENAI_MODEL:-gpt-4.1-mini}"

      - name: Build, seed, and run accepted specs
        id: autogen
        continue-on-error: true
        run: |
          set -o pipefail
          LIMIT_ARGS=""
          if [ "${BUILD_LIMIT}" != "0" ]; then
            LIMIT_ARGS="--limit ${BUILD_LIMIT}"
          fi
          python scripts/autogen_crazy_factory.py \
            --date "$RUN_DATE" \
            --skip-generate \
            --publish-root "data/ideas/runs/$RUN_DATE/build" \
            --template-build \
            --max-failures 5 \
            --verbose \
            $LIMIT_ARGS

      - name: Ensure dashboards and signals are current
        if: always()
        run: |
          python crazy_run.py
          python precompute_signals.py --min-days 30
          python scripts/rolling_30d_leaderboard.py

      - name: Validate generated public files
        if: always()
        run: |
          python scripts/check_public_html_placeholders.py
          python -m py_compile scripts/autogen_crazy_factory.py scripts/build_template_algo.py scripts/final_publish_llm_gate.py

      - name: Summarize build
        if: always()
        run: |
          SUMMARY="data/ideas/runs/$RUN_DATE/factory_results/summary.json"
          GATE="data/ideas/runs/$RUN_DATE/publish_gate_reports/summary.json"
          {
            echo "## Crazy Daily Build Factory"
            echo ""
            echo "- Date: $RUN_DATE"
            echo "- Autogen outcome: ${{ steps.autogen.outcome }}"
            if [ -f "$GATE" ]; then
              echo "- Gate summary:"
              python - <<'PY'
          import json, os
          path = f"data/ideas/runs/{os.environ['RUN_DATE']}/publish_gate_reports/summary.json"
          with open(path) as f:
              d = json.load(f)
          print(f"  - build={d.get('build', 0)} intervention={d.get('intervention', 0)} reject={d.get('reject', 0)}")
          PY
            fi
            if [ -f "$SUMMARY" ]; then
              echo "- Factory summary:"
              python - <<'PY'
          import json, os
          path = f"data/ideas/runs/{os.environ['RUN_DATE']}/factory_results/summary.json"
          with open(path) as f:
              d = json.load(f)
          print(f"  - completed={d.get('completed', 0)} built={d.get('built', 0)} seeded={d.get('seeded', 0)} intervention={d.get('intervention', 0)} failed={d.get('failed', 0)} skipped={d.get('skipped', 0)}")
          PY
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit generated signals
        if: always()
        run: |
          git config user.name "crazy-build-bot"
          git config user.email "crazy-build-bot@users.noreply.github.com"
          git add crazy/algos data/algos_registry_crazy.txt
          git add data/ideas docs/ideas
          git add data/crazy/state docs/algos docs/crazy
          git add docs/signals docs/leaderboards docs/ledgers || true
          if [ -d data/blocked ]; then
            git add data/blocked
          fi
          if [ -d data/algos ]; then
            git add data/algos
          fi
          git diff --cached --quiet || git commit -m "daily: crazy build factory $RUN_DATE"
          git pull --rebase --autostash
          git push

      - name: Prepare build email
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        run: |
          python scripts/crazy_build_email.py > /tmp/crazy_build_email.txt || echo "crazy_build_email.py failed" > /tmp/crazy_build_email.txt

      - name: Email build report
        if: ${{ always() && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "Crazy Build Factory - ${{ env.RUN_DATE }} - ${{ job.status }}"
          body: file:///tmp/crazy_build_email.txt
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_USER }}

      - name: Assess factory result
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_date = os.environ["RUN_DATE"]
          summary_path = Path(f"data/ideas/runs/{run_date}/factory_results/summary.json")
          if not summary_path.exists():
              raise SystemExit("Factory summary missing; build pipeline did not produce a result.")

          summary = json.loads(summary_path.read_text())
          completed = int(summary.get("completed") or 0)
          seeded = int(summary.get("seeded") or 0)
          failed = int(summary.get("failed") or 0)
          run_ok = summary.get("run_ok", True)

          print(
              f"factory completed={completed} seeded={seeded} "
              f"failed={failed} run_ok={run_ok}"
          )

          if run_ok is False:
              raise SystemExit("Factory built algos, but final crazy_run/precompute failed.")
          if completed == 0 or seeded == 0:
              raise SystemExit("Factory produced no seeded algos; this is a real failure.")
          if failed:
              print("Factory had parked/failed specs, but seeded usable algos. Treating as success.")
          PY
