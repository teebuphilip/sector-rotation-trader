<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Private Algo Index</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #111827;
      --panel-2: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #6ee7b7;
      --border: #243041;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    .card {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.98));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }
    .sub {
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .note {
      display: inline-block;
      margin: 0 0 24px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(110, 231, 183, 0.08);
      font-size: 0.92rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }
    li a {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      text-decoration: none;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }
    li a:hover {
      transform: translateY(-1px);
      border-color: rgba(110, 231, 183, 0.5);
      background: rgba(110, 231, 183, 0.06);
    }
    .label {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .path {
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="note">Hidden index · not linked from public nav</div>
      <h1>Private Algo Index</h1>
      <p class="sub">Quick access to the three named algo pages.</p>
      <ul>
        <li>
          <a href="../../algos/retail-sales-momentum/index.html" target="_blank" rel="noopener noreferrer">
            <div class="label">Retail Sales Momentum</div>
            <div class="path">docs/algos/retail-sales-momentum/index.html</div>
          </a>
        </li>
        <li>
          <a href="../../algos/uber-mobility/index.html" target="_blank" rel="noopener noreferrer">
            <div class="label">Uber Mobility Index</div>
            <div class="path">docs/algos/uber-mobility/index.html</div>
          </a>
        </li>
        <li>
          <a href="../../algos/tsa/index.html" target="_blank" rel="noopener noreferrer">
            <div class="label">TSA Body Count</div>
            <div class="path">docs/algos/tsa/index.html</div>
          </a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
